version: 2

updates:
  # Android / Gradle dependencies
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "daily"
      time: "13:00"
      timezone: "Asia/Kolkata"

    open-pull-requests-limit: 10

    groups:
      androidx:
        patterns:
          - "androidx*"

      google:
        patterns:
          - "com.google.*"

      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"

      gradle:
        patterns:
          - "*"

    commit-message:
      prefix: "deps"

    labels:
      - "dependencies"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "13:30"
      timezone: "Asia/Kolkata"

    open-pull-requests-limit: 5

    commit-message:
      prefix: "ci"

    labels:
      - "dependencies"
      - "github-actions"
